// ============================================================
// Floating background sparkles
// ============================================================
function FloatingBackground() {
  const items = Array.from({ length: 18 }, (_, i) => i);
  return (
    <div className="fixed inset-0 pointer-events-none overflow-hidden z-0">
      {items.map((i) => {
        const left = (i * 37) % 100;
        const top = (i * 53) % 100;
        const size = 8 + (i % 4) * 6;
        const delay = (i * 0.4) % 6;
        const dur = 6 + (i % 5);
        return (
          <div key={i} className="absolute"
               style={{ left: `${left}%`, top: `${top}%`, animation: `float ${dur}s ease-in-out ${delay}s infinite` }}>
            <Star size={size} className="text-pink-200" fill="currentColor"
                  style={{ filter: "drop-shadow(0 0 6px rgba(255,182,193,0.8))" }} />
          </div>
        );
      })}
    </div>
  );
}

// ============================================================
// Question Card
// ============================================================
function QuestionCard({ q, qIndex, total, score, onAnswer, name }) {
  const [input, setInput] = useState("");
  const [feedback, setFeedback] = useState(null);
  const [locked, setLocked] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => {
    setInput(""); setFeedback(null); setLocked(false);
    if (q.type === "input" && inputRef.current) {
      setTimeout(() => inputRef.current?.focus(), 100);
    }
  }, [q.id]);

  const normalize = (s) => String(s).trim().toLowerCase().replace(/\s+/g, "");
  const checkAnswer = (given) => {
    if (locked) return;
    setLocked(true);
    const correctList = q.accept || [q.answer];
    const correct = correctList.some((a) => normalize(a) === normalize(given));
    setFeedback({ correct, correctAnswer: q.answer });
    setTimeout(() => onAnswer(correct), correct ? 1400 : 2200);
  };

  const progress = (qIndex / total) * 100;

  return (
    <div className="relative z-10 min-h-screen flex items-center justify-center p-4">
      <div className="max-w-2xl w-full">
        <div className="flex items-center justify-between mb-4 px-2">
          <div className="bg-white/90 backdrop-blur rounded-full px-4 py-2 shadow-lg flex items-center gap-2"
               style={{ fontFamily: "'Fredoka', cursive" }}>
            <Sparkles size={18} className="text-purple-500" fill="currentColor" />
            <span className="text-purple-700 font-bold">{qIndex + 1} / {total}</span>
          </div>
          <div className="bg-white/90 backdrop-blur rounded-full px-4 py-2 shadow-lg flex items-center gap-2"
               style={{ fontFamily: "'Fredoka', cursive" }}>
            <Star size={18} className="text-yellow-400" fill="currentColor" />
            <span className="text-purple-700 font-bold">{score}</span>
          </div>
        </div>

        <div className="bg-white/60 rounded-full h-3 overflow-hidden mb-6 shadow-inner">
          <div className="h-full transition-all duration-700 ease-out"
               style={{ width: `${progress}%`, background: "linear-gradient(90deg,#ec4899,#a855f7,#3b82f6)" }} />
        </div>

        <div key={q.id}
             className="bg-white/95 backdrop-blur-md rounded-[2rem] shadow-2xl p-8 border-4 border-pink-200"
             style={{ boxShadow: "0 25px 60px -15px rgba(168,85,247,0.4)", animation: "cardIn 0.5s ease-out" }}>
          <div className="flex justify-between items-center mb-4">
            <span className="inline-block px-3 py-1 rounded-full text-xs font-bold text-white"
                  style={{ fontFamily: "'Fredoka', cursive",
                           background: "linear-gradient(90deg,#a855f7,#ec4899)" }}>
              {q.topic}
            </span>
            <Heart size={20} className="text-pink-400" fill="currentColor" />
          </div>

          <h2 className="text-2xl md:text-3xl text-purple-900 mb-6 leading-snug font-bold"
              style={{ fontFamily: "'Fredoka', cursive" }}>
            {q.q}
          </h2>

          {q.type === "mc" ? (
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              {q.choices.map((c, i) => {
                const colors = ["from-pink-400 to-pink-500", "from-purple-400 to-purple-500",
                                "from-blue-400 to-blue-500", "from-teal-400 to-teal-500"];
                const isCorrectChoice = feedback && c === q.answer;
                const isWrongPicked = feedback && !feedback.correct && input === c;
                return (
                  <button key={i} onClick={() => { setInput(c); checkAnswer(c); }}
                          disabled={locked}
                          className={`p-4 rounded-2xl text-white text-lg font-bold transition-all transform hover:scale-105 active:scale-95 disabled:cursor-not-allowed bg-gradient-to-br ${colors[i % 4]} ${
                            isCorrectChoice ? "ring-4 ring-green-400 scale-105" : ""
                          } ${isWrongPicked ? "ring-4 ring-red-400 opacity-70" : ""}`}
                          style={{ fontFamily: "'Fredoka', cursive",
                                   boxShadow: "0 8px 20px -5px rgba(0,0,0,0.2)" }}>
                    {c}
                  </button>
                );
              })}
            </div>
          ) : (
            <div>
              <input ref={inputRef} type="text" value={input}
                     onChange={(e) => setInput(e.target.value)}
                     onKeyDown={(e) => { if (e.key === "Enter" && input.trim() && !locked) checkAnswer(input); }}
                     disabled={locked} placeholder="Type your answer..."
                     className="w-full px-5 py-4 rounded-2xl border-purple-300 text-purple-800 text-2xl text-center font-bold focus:outline-none focus:border-pink-400 bg-white"
                     style={{ fontFamily: "'Fredoka', cursive", borderWidth: "4px", borderStyle: "solid" }} />
              <button onClick={() => input.trim() && checkAnswer(input)}
                      disabled={locked || !input.trim()}
                      className="w-full mt-3 py-3 rounded-2xl text-white text-lg font-bold transition-all hover:scale-105 active:scale-95 disabled:opacity-50"
                      style={{ fontFamily: "'Fredoka', cursive",
                               background: "linear-gradient(135deg,#ec4899,#a855f7)" }}>
                Submit <ChevronRight size={18} className="inline" />
              </button>
            </div>
          )}

          {feedback && (
            <div className={`mt-5 p-4 rounded-2xl text-center font-bold text-lg ${
                   feedback.correct ? "bg-green-100 text-green-700" : "bg-pink-100 text-pink-700" }`}
                 style={{ fontFamily: "'Fredoka', cursive", animation: "popIn 0.4s ease-out" }}>
              {feedback.correct ? (
                <span>🎉 Yes! You got it, {name}! ✨</span>
              ) : (
                <span>💖 So close! The answer was <strong>{feedback.correctAnswer}</strong></span>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// MINI-GAME 1: Star Catcher
// ============================================================
function StarCatcherGame({ onFinish }) {
  const canvasRef = useRef(null);
  const [score, setScore] = useState(0);
  const [timeLeft, setTimeLeft] = useState(600);
  const stateRef = useRef({
    paddleX: 0, paddleW: 110, paddleH: 22,
    items: [], keys: { left: false, right: false },
    score: 0, lastSpawn: 0, running: true,
  });

  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    const W = canvas.width;
    const H = canvas.height;
    stateRef.current.paddleX = W / 2 - stateRef.current.paddleW / 2;

    const onMove = (e) => {
      const rect = canvas.getBoundingClientRect();
      const scale = W / rect.width;
      const x = (e.clientX - rect.left) * scale;
      stateRef.current.paddleX = Math.max(0, Math.min(W - stateRef.current.paddleW, x - stateRef.current.paddleW / 2));
    };
    const onTouch = (e) => {
      if (!e.touches[0]) return;
      const rect = canvas.getBoundingClientRect();
      const scale = W / rect.width;
      const x = (e.touches[0].clientX - rect.left) * scale;
      stateRef.current.paddleX = Math.max(0, Math.min(W - stateRef.current.paddleW, x - stateRef.current.paddleW / 2));
    };
    const onKeyDown = (e) => {
      if (e.key === "ArrowLeft") stateRef.current.keys.left = true;
      if (e.key === "ArrowRight") stateRef.current.keys.right = true;
    };
    const onKeyUp = (e) => {
      if (e.key === "ArrowLeft") stateRef.current.keys.left = false;
      if (e.key === "ArrowRight") stateRef.current.keys.right = false;
    };

    canvas.addEventListener("mousemove", onMove);
    canvas.addEventListener("touchmove", onTouch, { passive: true });
    window.addEventListener("keydown", onKeyDown);
    window.addEventListener("keyup", onKeyUp);

    let raf, last = performance.now(), particles = [];

    const drawStar = (cx, cy, r, color, glow, rot = 0) => {
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(rot);
      ctx.shadowColor = glow; ctx.shadowBlur = 20;
      ctx.fillStyle = color;
      ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const ang = (Math.PI / 5) * i - Math.PI / 2;
        const rad = i % 2 === 0 ? r : r * 0.45;
        const x = Math.cos(ang) * rad;
        const y = Math.sin(ang) * rad;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath(); ctx.fill(); ctx.restore();
    };
    const drawBomb = (cx, cy, r, rot) => {
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(rot);
      ctx.shadowColor = "rgba(0,0,0,0.5)"; ctx.shadowBlur = 10;
      ctx.fillStyle = "#374151";
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = "#92400e"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(0, -r);
      ctx.quadraticCurveTo(r * 0.5, -r * 1.5, r * 0.7, -r * 1.7); ctx.stroke();
      ctx.fillStyle = "#fbbf24"; ctx.shadowColor = "#f59e0b"; ctx.shadowBlur = 12;
      ctx.beginPath(); ctx.arc(r * 0.7, -r * 1.7, 4, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    };
    const drawHeart = (cx, cy, r, rot) => {
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(rot);
      ctx.shadowColor = "rgba(236,72,153,0.7)"; ctx.shadowBlur = 18;
      ctx.fillStyle = "#ec4899";
      ctx.beginPath();
      const s = r / 16;
      ctx.moveTo(0, 5 * s);
      ctx.bezierCurveTo(-12 * s, -8 * s, -16 * s, 4 * s, 0, 14 * s);
      ctx.bezierCurveTo(16 * s, 4 * s, 12 * s, -8 * s, 0, 5 * s);
      ctx.fill(); ctx.restore();
    };

    const spawn = (now) => {
      if (now - stateRef.current.lastSpawn > 600) {
        stateRef.current.lastSpawn = now;
        const r = Math.random();
        const x = 30 + Math.random() * (W - 60);
        let type = "star";
        if (r < 0.18) type = "bomb";
        else if (r < 0.28) type = "heart";
        const size = type === "heart" ? 22 : type === "bomb" ? 18 : 16 + Math.random() * 8;
        stateRef.current.items.push({
          x, y: -30, vy: 130 + Math.random() * 90, type,
          rot: Math.random() * Math.PI * 2, vrot: (Math.random() - 0.5) * 4,
          size, colorIdx: Math.floor(Math.random() * 4),
        });
      }
    };

    const starColors = [
      ["#fbbf24", "#f59e0b"], ["#ec4899", "#be185d"],
      ["#a855f7", "#7e22ce"], ["#06b6d4", "#0891b2"],
    ];

    const tick = (now) => {
      if (!stateRef.current.running) return;
      const dt = Math.min(0.05, (now - last) / 1000); last = now;

      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, "#1e1b4b"); grad.addColorStop(0.5, "#581c87"); grad.addColorStop(1, "#831843");
      ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

      for (let i = 0; i < 50; i++) {
        const tx = (i * 73) % W; const ty = (i * 131) % H;
        const tw = 0.5 + Math.sin(now / 400 + i) * 0.5;
        ctx.fillStyle = `rgba(255,255,255,${0.3 + tw * 0.5})`;
        ctx.fillRect(tx, ty, 2, 2);
      }

      const speed = 600 * dt;
      if (stateRef.current.keys.left) stateRef.current.paddleX -= speed;
      if (stateRef.current.keys.right) stateRef.current.paddleX += speed;
      stateRef.current.paddleX = Math.max(0, Math.min(W - stateRef.current.paddleW, stateRef.current.paddleX));

      spawn(now);

      const paddleY = H - 60;
      for (const it of stateRef.current.items) {
        it.y += it.vy * dt; it.rot += it.vrot * dt;
        if (it.y + it.size >= paddleY && it.y - it.size <= paddleY + stateRef.current.paddleH &&
            it.x >= stateRef.current.paddleX && it.x <= stateRef.current.paddleX + stateRef.current.paddleW) {
          if (it.type === "bomb") {
            stateRef.current.score = Math.max(0, stateRef.current.score - 5);
            for (let i = 0; i < 14; i++) particles.push({
              x: it.x, y: it.y, vx: (Math.random() - 0.5) * 300, vy: (Math.random() - 0.5) * 300,
              life: 1, color: "#ef4444"
            });
          } else if (it.type === "heart") {
            stateRef.current.score += 5;
            for (let i = 0; i < 16; i++) particles.push({
              x: it.x, y: it.y, vx: (Math.random() - 0.5) * 250, vy: (Math.random() - 0.5) * 250,
              life: 1, color: "#ec4899"
            });
          } else {
            stateRef.current.score += 1;
            for (let i = 0; i < 10; i++) particles.push({
              x: it.x, y: it.y, vx: (Math.random() - 0.5) * 200, vy: (Math.random() - 0.5) * 200,
              life: 1, color: starColors[it.colorIdx][0]
            });
          }
          it.dead = true;
        }
      }
      stateRef.current.items = stateRef.current.items.filter((it) => !it.dead && it.y < H + 50);

      for (const it of stateRef.current.items) {
        if (it.type === "bomb") drawBomb(it.x, it.y, it.size, it.rot);
        else if (it.type === "heart") drawHeart(it.x, it.y, it.size, it.rot);
        else { const [c1, c2] = starColors[it.colorIdx]; drawStar(it.x, it.y, it.size, c1, c2, it.rot); }
      }

      particles.forEach((p) => {
        p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 200 * dt; p.life -= dt * 1.5;
        if (p.life > 0) {
          ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
          ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
        }
      });
      particles = particles.filter((p) => p.life > 0);
      ctx.globalAlpha = 1;

      const px = stateRef.current.paddleX;
      const pw = stateRef.current.paddleW;
      const ph = stateRef.current.paddleH;
      const pgrad = ctx.createLinearGradient(px, paddleY, px, paddleY + ph);
      pgrad.addColorStop(0, "#fce7f3"); pgrad.addColorStop(0.5, "#f472b6"); pgrad.addColorStop(1, "#be185d");
      ctx.shadowColor = "rgba(236,72,153,0.8)"; ctx.shadowBlur = 20;
      ctx.fillStyle = pgrad;
      const rad = ph / 2;
      ctx.beginPath();
      ctx.moveTo(px + rad, paddleY);
      ctx.lineTo(px + pw - rad, paddleY);
      ctx.quadraticCurveTo(px + pw, paddleY, px + pw, paddleY + rad);
      ctx.lineTo(px + pw, paddleY + ph - rad);
      ctx.quadraticCurveTo(px + pw, paddleY + ph, px + pw - rad, paddleY + ph);
      ctx.lineTo(px + rad, paddleY + ph);
      ctx.quadraticCurveTo(px, paddleY + ph, px, paddleY + ph - rad);
      ctx.lineTo(px, paddleY + rad);
      ctx.quadraticCurveTo(px, paddleY, px + rad, paddleY);
      ctx.fill(); ctx.shadowBlur = 0;
      drawStar(px + pw / 2, paddleY + ph / 2, 6, "#fff", "#fff", now / 200);

      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);

    const syncInt = setInterval(() => setScore(stateRef.current.score), 100);

    return () => {
      stateRef.current.running = false;
      cancelAnimationFrame(raf);
      clearInterval(syncInt);
      canvas.removeEventListener("mousemove", onMove);
      canvas.removeEventListener("touchmove", onTouch);
      window.removeEventListener("keydown", onKeyDown);
      window.removeEventListener("keyup", onKeyUp);
    };
  }, []);

  useEffect(() => {
    if (timeLeft <= 0) { onFinish(); return; }
    const t = setTimeout(() => setTimeLeft((s) => s - 1), 1000);
    return () => clearTimeout(t);
  }, [timeLeft, onFinish]);

  const mins = Math.floor(timeLeft / 60);
  const secs = timeLeft % 60;

  return (
    <div className="relative z-10 min-h-screen flex items-center justify-center p-4">
      <div className="max-w-3xl w-full">
        <div className="flex justify-between mb-3 px-2">
          <div className="bg-white/95 rounded-full px-4 py-2 shadow-lg flex items-center gap-2"
               style={{ fontFamily: "'Fredoka', cursive" }}>
            <Star size={18} className="text-yellow-400" fill="currentColor" />
            <span className="text-purple-700 font-bold">Score: {score}</span>
          </div>
          <div className="bg-white/95 rounded-full px-4 py-2 shadow-lg"
               style={{ fontFamily: "'Fredoka', cursive" }}>
            <span className="text-purple-700 font-bold">⏰ {mins}:{secs.toString().padStart(2, "0")}</span>
          </div>
        </div>
        <canvas ref={canvasRef} width={800} height={500}
                className="w-full rounded-3xl shadow-2xl border-4 border-pink-300"
                style={{ touchAction: "none", cursor: "none" }} />
        <div className="mt-3 text-center text-white text-sm bg-purple-600/80 backdrop-blur rounded-full px-4 py-2 inline-block mx-auto">
          ✨ Move with mouse, finger, or arrow keys! Catch ⭐ stars (+1) and 💖 hearts (+5). Avoid 💣 bombs (-5)!
        </div>
        <div className="text-center mt-3">
          <button onClick={onFinish}
                  className="px-6 py-2 bg-white/90 rounded-full text-purple-700 font-bold hover:bg-white"
                  style={{ fontFamily: "'Fredoka', cursive" }}>
            Done playing →
          </button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// MINI-GAME 2: Unicorn Garden
// ============================================================
function UnicornGardenGame({ onFinish }) {
  const canvasRef = useRef(null);
  const [timeLeft, setTimeLeft] = useState(600);
  const [score, setScore] = useState(0);
  const stateRef = useRef({
    flowers: [], butterflies: [], sparkles: [], rainbows: [],
    score: 0, running: true,
    unicorn: { x: 400, y: 380, targetX: 400, dir: 1, bounce: 0 },
  });

  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    const W = canvas.width;
    const H = canvas.height;

    for (let i = 0; i < 5; i++) {
      stateRef.current.butterflies.push({
        x: Math.random() * W, y: 50 + Math.random() * 200,
        vx: (Math.random() - 0.5) * 60, vy: (Math.random() - 0.5) * 40,
        wing: Math.random() * Math.PI * 2,
        color: ["#ec4899", "#a855f7", "#3b82f6", "#06b6d4", "#fbbf24"][i % 5],
        size: 14 + Math.random() * 6,
      });
    }

    const handleClick = (clientX, clientY) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      const x = (clientX - rect.left) * scaleX;
      const y = (clientY - rect.top) * scaleY;

      let caught = false;
      stateRef.current.butterflies.forEach((b) => {
        const dx = b.x - x, dy = b.y - y;
        if (Math.sqrt(dx * dx + dy * dy) < b.size + 8) {
          b.dead = true; caught = true; stateRef.current.score += 3;
          for (let i = 0; i < 18; i++) stateRef.current.sparkles.push({
            x: b.x, y: b.y, vx: (Math.random() - 0.5) * 220, vy: (Math.random() - 0.5) * 220,
            life: 1, color: b.color, size: 3 + Math.random() * 3,
          });
        }
      });
      stateRef.current.butterflies = stateRef.current.butterflies.filter((b) => !b.dead);
      while (stateRef.current.butterflies.length < 5) {
        stateRef.current.butterflies.push({
          x: Math.random() * W, y: 50 + Math.random() * 200,
          vx: (Math.random() - 0.5) * 60, vy: (Math.random() - 0.5) * 40,
          wing: Math.random() * Math.PI * 2,
          color: ["#ec4899", "#a855f7", "#3b82f6", "#06b6d4", "#fbbf24"][Math.floor(Math.random() * 5)],
          size: 14 + Math.random() * 6,
        });
      }

      if (!caught && y > H - 130) {
        const colors = [
          ["#ec4899", "#fbcfe8"], ["#a855f7", "#e9d5ff"], ["#fbbf24", "#fef3c7"],
          ["#3b82f6", "#bfdbfe"], ["#ef4444", "#fecaca"],
        ];
        const c = colors[Math.floor(Math.random() * colors.length)];
        stateRef.current.flowers.push({
          x, y, growth: 0, color: c[0], centerColor: c[1],
          petals: 5 + Math.floor(Math.random() * 4), sway: Math.random() * Math.PI * 2,
        });
        stateRef.current.score += 1;
        stateRef.current.unicorn.targetX = Math.max(60, Math.min(W - 60, x));
      }
    };

    const onClick = (e) => handleClick(e.clientX, e.clientY);
    const onTouch = (e) => { const t = e.touches[0]; if (t) handleClick(t.clientX, t.clientY); };
    canvas.addEventListener("click", onClick);
    canvas.addEventListener("touchstart", onTouch, { passive: true });

    let raf, last = performance.now(), rainbowTimer = 0;

    const drawUnicorn = (x, y, dir, bounce) => {
      ctx.save(); ctx.translate(x, y + Math.sin(bounce) * 4); ctx.scale(dir, 1);
      ctx.fillStyle = "#fff";
      ctx.shadowColor = "rgba(236,72,153,0.5)"; ctx.shadowBlur = 15;
      ctx.beginPath(); ctx.ellipse(0, 0, 38, 22, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(-22, 15, 7, 18); ctx.fillRect(-8, 15, 7, 18);
      ctx.fillRect(8, 15, 7, 18); ctx.fillRect(22, 15, 7, 18);
      ctx.beginPath(); ctx.ellipse(35, -10, 16, 13, 0.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(32, -22); ctx.lineTo(36, -32); ctx.lineTo(40, -22);
      ctx.closePath(); ctx.fill();
      ctx.shadowBlur = 0;
      const horn = ctx.createLinearGradient(40, -38, 50, -20);
      horn.addColorStop(0, "#fde047"); horn.addColorStop(1, "#f59e0b");
      ctx.fillStyle = horn;
      ctx.beginPath();
      ctx.moveTo(46, -22); ctx.lineTo(50, -42); ctx.lineTo(54, -22);
      ctx.closePath(); ctx.fill();
      const mane = ctx.createLinearGradient(0, -25, 0, 10);
      mane.addColorStop(0, "#ec4899"); mane.addColorStop(0.5, "#a855f7"); mane.addColorStop(1, "#3b82f6");
      ctx.fillStyle = mane;
      ctx.beginPath();
      ctx.moveTo(20, -20);
      ctx.quadraticCurveTo(15, -28, 5, -22);
      ctx.quadraticCurveTo(-5, -15, -15, -18);
      ctx.quadraticCurveTo(-25, -12, -30, -5);
      ctx.lineTo(-30, 5);
      ctx.quadraticCurveTo(-10, -8, 25, -10);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-35, 0);
      ctx.quadraticCurveTo(-50, 5, -45, 25);
      ctx.quadraticCurveTo(-40, 15, -35, 10);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#1e1b4b";
      ctx.beginPath(); ctx.arc(40, -10, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.beginPath(); ctx.arc(40.8, -10.8, 1, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    };

    const drawFlower = (f, t) => {
      const g = Math.min(1, f.growth);
      const sway = Math.sin(t / 600 + f.sway) * 0.08;
      ctx.save(); ctx.translate(f.x, f.y); ctx.rotate(sway);
      ctx.strokeStyle = "#16a34a"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(-3, -15 * g, 0, -30 * g);
      ctx.stroke();
      if (g > 0.4) {
        ctx.fillStyle = "#22c55e";
        ctx.beginPath(); ctx.ellipse(-7, -15 * g, 7, 4, -0.5, 0, Math.PI * 2); ctx.fill();
      }
      const py = -30 * g;
      const petalSize = 9 * g;
      ctx.shadowColor = f.color; ctx.shadowBlur = 10;
      for (let i = 0; i < f.petals; i++) {
        const ang = (Math.PI * 2 * i) / f.petals;
        ctx.fillStyle = f.color;
        ctx.beginPath();
        ctx.ellipse(Math.cos(ang) * petalSize * 0.8, py + Math.sin(ang) * petalSize * 0.8,
                    petalSize, petalSize * 0.7, ang, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.shadowBlur = 0;
      ctx.fillStyle = f.centerColor;
      ctx.beginPath(); ctx.arc(0, py, petalSize * 0.5, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    };

    const drawButterfly = (b) => {
      ctx.save(); ctx.translate(b.x, b.y);
      const flap = Math.sin(b.wing) * 0.5 + 0.5;
      ctx.fillStyle = "#1e1b4b";
      ctx.beginPath(); ctx.ellipse(0, 0, 2, b.size * 0.6, 0, 0, Math.PI * 2); ctx.fill();
      ctx.shadowColor = b.color; ctx.shadowBlur = 12;
      ctx.fillStyle = b.color; ctx.globalAlpha = 0.85;
      ctx.beginPath(); ctx.ellipse(-b.size * 0.7 * (1 - flap * 0.3), -b.size * 0.3, b.size * 0.8, b.size * 0.6, -0.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(b.size * 0.7 * (1 - flap * 0.3), -b.size * 0.3, b.size * 0.8, b.size * 0.6, 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(-b.size * 0.6 * (1 - flap * 0.3), b.size * 0.3, b.size * 0.6, b.size * 0.5, 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(b.size * 0.6 * (1 - flap * 0.3), b.size * 0.3, b.size * 0.6, b.size * 0.5, -0.3, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
      ctx.restore();
    };

    const drawRainbow = (r) => {
      const colors = ["#ef4444", "#f59e0b", "#fbbf24", "#22c55e", "#3b82f6", "#a855f7"];
      ctx.save(); ctx.globalAlpha = r.life;
      colors.forEach((c, i) => {
        ctx.strokeStyle = c; ctx.lineWidth = 8;
        ctx.beginPath(); ctx.arc(r.x, r.y, 60 + i * 9, Math.PI, 0); ctx.stroke();
      });
      ctx.restore();
    };

    const tick = (now) => {
      if (!stateRef.current.running) return;
      const dt = Math.min(0.05, (now - last) / 1000); last = now;

      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, "#fce7f3"); sky.addColorStop(0.4, "#fbcfe8");
      sky.addColorStop(0.8, "#e9d5ff"); sky.addColorStop(1, "#86efac");
      ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

      ctx.save();
      ctx.shadowColor = "#fbbf24"; ctx.shadowBlur = 30;
      ctx.fillStyle = "#fde047";
      ctx.beginPath(); ctx.arc(W - 70, 70, 35, 0, Math.PI * 2); ctx.fill();
      ctx.restore();

      ctx.fillStyle = "rgba(255,255,255,0.85)";
      for (let i = 0; i < 4; i++) {
        const cx = (((now / 30 + i * 200)) % (W + 200)) - 100;
        const cy = 80 + i * 30;
        ctx.beginPath();
        ctx.arc(cx, cy, 22, 0, Math.PI * 2);
        ctx.arc(cx + 20, cy - 5, 25, 0, Math.PI * 2);
        ctx.arc(cx + 45, cy, 22, 0, Math.PI * 2);
        ctx.fill();
      }

      const ground = ctx.createLinearGradient(0, H - 130, 0, H);
      ground.addColorStop(0, "#86efac"); ground.addColorStop(1, "#16a34a");
      ctx.fillStyle = ground; ctx.fillRect(0, H - 130, W, 130);
      ctx.strokeStyle = "#15803d"; ctx.lineWidth = 1;
      for (let i = 0; i < W; i += 5) {
        ctx.beginPath();
        ctx.moveTo(i, H - 130);
        ctx.lineTo(i + Math.sin(now / 300 + i) * 2, H - 130 - 5 - (i % 4));
        ctx.stroke();
      }

      rainbowTimer -= dt;
      if (rainbowTimer <= 0 && stateRef.current.flowers.length > 0 && stateRef.current.flowers.length % 5 === 0) {
        rainbowTimer = 8;
        stateRef.current.rainbows.push({ x: W / 2, y: H - 130, life: 1 });
      }
      stateRef.current.rainbows.forEach((r) => {
        r.life -= dt * 0.15;
        drawRainbow(r);
      });
      stateRef.current.rainbows = stateRef.current.rainbows.filter((r) => r.life > 0);

      stateRef.current.flowers.forEach((f) => {
        f.growth = Math.min(1, f.growth + dt * 1.2);
        drawFlower(f, now);
      });

      const u = stateRef.current.unicorn;
      const dx = u.targetX - u.x;
      if (Math.abs(dx) > 2) {
        u.dir = dx > 0 ? 1 : -1;
        u.x += dx * dt * 3;
        u.bounce += dt * 12;
      }
      drawUnicorn(u.x, u.y, u.dir, u.bounce);

      stateRef.current.butterflies.forEach((b) => {
        b.x += b.vx * dt; b.y += b.vy * dt; b.wing += dt * 18;
        if (b.x < 20 || b.x > W - 20) b.vx *= -1;
        if (b.y < 30 || b.y > H - 200) b.vy *= -1;
        b.vx += (Math.random() - 0.5) * 20 * dt;
        b.vy += (Math.random() - 0.5) * 20 * dt;
        b.vx = Math.max(-80, Math.min(80, b.vx));
        b.vy = Math.max(-50, Math.min(50, b.vy));
        drawButterfly(b);
      });

      stateRef.current.sparkles.forEach((s) => {
        s.x += s.vx * dt; s.y += s.vy * dt; s.vy += 100 * dt; s.life -= dt * 1.2;
        if (s.life > 0) {
          ctx.globalAlpha = s.life;
          ctx.fillStyle = s.color;
          ctx.shadowColor = s.color; ctx.shadowBlur = 8;
          ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
          ctx.shadowBlur = 0;
        }
      });
      stateRef.current.sparkles = stateRef.current.sparkles.filter((s) => s.life > 0);
      ctx.globalAlpha = 1;

      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);

    const syncInt = setInterval(() => setScore(stateRef.current.score), 200);

    return () => {
      stateRef.current.running = false;
      cancelAnimationFrame(raf);
      clearInterval(syncInt);
      canvas.removeEventListener("click", onClick);
      canvas.removeEventListener("touchstart", onTouch);
    };
  }, []);

  useEffect(() => {
    if (timeLeft <= 0) { onFinish(); return; }
    const t = setTimeout(() => setTimeLeft((s) => s - 1), 1000);
    return () => clearTimeout(t);
  }, [timeLeft, onFinish]);

  const mins = Math.floor(timeLeft / 60);
  const secs = timeLeft % 60;

  return (
    <div className="relative z-10 min-h-screen flex items-center justify-center p-4">
      <div className="max-w-3xl w-full">
        <div className="flex justify-between mb-3 px-2">
          <div className="bg-white/95 rounded-full px-4 py-2 shadow-lg flex items-center gap-2"
               style={{ fontFamily: "'Fredoka', cursive" }}>
            <Heart size={18} className="text-pink-400" fill="currentColor" />
            <span className="text-purple-700 font-bold">Garden: {score}</span>
          </div>
          <div className="bg-white/95 rounded-full px-4 py-2 shadow-lg"
               style={{ fontFamily: "'Fredoka', cursive" }}>
            <span className="text-purple-700 font-bold">⏰ {mins}:{secs.toString().padStart(2, "0")}</span>
          </div>
        </div>
        <canvas ref={canvasRef} width={800} height={500}
                className="w-full rounded-3xl shadow-2xl border-4 border-pink-300"
                style={{ touchAction: "none", cursor: "crosshair" }} />
        <div className="mt-3 text-center text-purple-800 text-sm bg-white/90 backdrop-blur rounded-full px-4 py-2 inline-block mx-auto">
          🦄 Click on grass to plant flowers (+1)! Click butterflies to catch them (+3)! Every 5 flowers = rainbow! 🌈
        </div>
        <div className="text-center mt-3">
          <button onClick={onFinish}
                  className="px-6 py-2 bg-white/90 rounded-full text-purple-700 font-bold hover:bg-white"
                  style={{ fontFamily: "'Fredoka', cursive" }}>
            Get my certificate →
          </button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// Final results & certificate
// ============================================================
function FinalScreen({ score, name, onPlayGame, gamePlayed, total }) {
  const champion = score > 36;
  const great = score >= 30;
  const [showConfetti, setShowConfetti] = useState(true);

  useEffect(() => {
    const t = setTimeout(() => setShowConfetti(false), 4000);
    return () => clearTimeout(t);
  }, []);

  const downloadCert = () => {
    const canvas = document.createElement("canvas");
    canvas.width = 1200; canvas.height = 850;
    const ctx = canvas.getContext("2d");
    const grad = ctx.createLinearGradient(0, 0, 1200, 850);
    grad.addColorStop(0, "#fce7f3"); grad.addColorStop(0.5, "#e9d5ff"); grad.addColorStop(1, "#dbeafe");
    ctx.fillStyle = grad; ctx.fillRect(0, 0, 1200, 850);
    ctx.strokeStyle = "#ec4899"; ctx.lineWidth = 8; ctx.strokeRect(40, 40, 1120, 770);
    ctx.strokeStyle = "#a855f7"; ctx.lineWidth = 3; ctx.strokeRect(60, 60, 1080, 730);
    const drawStar = (cx, cy, r, color) => {
      ctx.fillStyle = color; ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const ang = (Math.PI / 5) * i - Math.PI / 2;
        const rad = i % 2 === 0 ? r : r * 0.45;
        const x = cx + Math.cos(ang) * rad; const y = cy + Math.sin(ang) * rad;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath(); ctx.fill();
    };
    drawStar(120, 120, 40, "#fbbf24");
    drawStar(1080, 120, 40, "#ec4899");
    drawStar(120, 730, 40, "#a855f7");
    drawStar(1080, 730, 40, "#3b82f6");
    ctx.fillStyle = "#831843"; ctx.textAlign = "center";
    ctx.font = "bold 72px serif"; ctx.fillText("Certificate of Achievement", 600, 220);
    ctx.fillStyle = "#7e22ce"; ctx.font = "italic 32px serif";
    ctx.fillText("Math Quest Champion", 600, 280);
    ctx.fillStyle = "#1e1b4b"; ctx.font = "28px serif";
    ctx.fillText("This certificate is proudly presented to", 600, 360);
    ctx.fillStyle = "#be185d"; ctx.font = "bold 64px cursive";
    ctx.fillText(name || "Math Star", 600, 450);
    ctx.strokeStyle = "#a855f7"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(300, 470); ctx.lineTo(900, 470); ctx.stroke();
    ctx.fillStyle = "#1e1b4b"; ctx.font = "26px serif";
    ctx.fillText("for outstanding excellence in 4th-grade math by scoring", 600, 530);
    ctx.fillStyle = "#ec4899"; ctx.font = "bold 48px serif";
    ctx.fillText(`${score} out of ${total}`, 600, 600);
    ctx.fillStyle = "#1e1b4b"; ctx.font = "italic 24px serif";
    ctx.fillText("on the Illinois IAR Math Practice Quest!", 600, 645);
    const date = new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
    ctx.fillStyle = "#7e22ce"; ctx.font = "20px serif";
    ctx.fillText(`Awarded on ${date}`, 600, 720);
    ctx.fillStyle = "#be185d"; ctx.font = "italic 22px serif";
    ctx.fillText("✨ You are a true Math Quest Champion ✨", 600, 760);

    canvas.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `${name || "MathStar"}-Certificate.png`; a.click();
      URL.revokeObjectURL(url);
    });
  };

  return (
    <div className="relative z-10 min-h-screen flex items-center justify-center p-6 overflow-hidden">
      {showConfetti && champion && (
        <div className="fixed inset-0 pointer-events-none overflow-hidden">
          {Array.from({ length: 60 }).map((_, i) => {
            const colors = ["#ec4899", "#a855f7", "#fbbf24", "#3b82f6", "#22c55e"];
            return (
              <div key={i} className="absolute"
                   style={{
                     left: `${(i * 13) % 100}%`, top: "-20px",
                     width: "10px", height: "14px",
                     background: colors[i % colors.length],
                     animation: `confetti ${2 + (i % 3)}s linear ${(i % 8) * 0.2}s infinite`,
                     borderRadius: "2px",
                   }} />
            );
          })}
        </div>
      )}

      <div className="bg-white/95 backdrop-blur-md rounded-[2.5rem] shadow-2xl p-10 max-w-xl w-full border-4 border-pink-200 text-center"
           style={{ boxShadow: "0 25px 60px -15px rgba(236,72,153,0.4)" }}>
        {champion ? (
          <div>
            <div className="flex justify-center mb-4">
              <div className="relative" style={{ animation: "spinSlow 4s linear infinite" }}>
                <Crown size={90} className="text-yellow-400" fill="currentColor"
                       style={{ filter: "drop-shadow(0 0 20px rgba(250,204,21,0.8))" }} />
              </div>
            </div>
            <h2 className="text-5xl mb-2 font-black"
                style={{ fontFamily: "'Fredoka', cursive",
                         background: "linear-gradient(135deg,#ec4899,#a855f7,#3b82f6)",
                         WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
              CHAMPION!
            </h2>
            <p className="text-purple-700 text-2xl mb-2" style={{ fontFamily: "'Fredoka', cursive" }}>
              🏆 {name}, you are AMAZING! 🏆
            </p>
            <p className="text-purple-600 text-lg mb-5" style={{ fontFamily: "'Fredoka', cursive" }}>
              You scored <strong>{score} / {total}</strong>!
            </p>
            {!gamePlayed ? (
              <div>
                <div className="bg-gradient-to-r from-pink-100 via-purple-100 to-blue-100 rounded-2xl p-4 mb-5 border-2 border-purple-300">
                  <p className="text-purple-800">
                    🦄 You unlocked the <strong>Unicorn Garden</strong>! Plant flowers, catch butterflies, and watch rainbows appear! 🌈
                  </p>
                </div>
                <button onClick={onPlayGame}
                        className="w-full py-4 rounded-2xl text-white text-xl font-bold transition-all hover:scale-105 active:scale-95 mb-3"
                        style={{ fontFamily: "'Fredoka', cursive",
                                 background: "linear-gradient(135deg,#ec4899,#a855f7,#3b82f6)",
                                 boxShadow: "0 10px 25px -5px rgba(168,85,247,0.5)" }}>
                  Enter the Unicorn Garden 🦄
                </button>
              </div>
            ) : (
              <div>
                <div className="bg-gradient-to-r from-yellow-100 to-pink-100 rounded-2xl p-4 mb-5 border-2 border-yellow-300">
                  <p className="text-purple-800 font-bold">
                    🎉 Download your special certificate! 🎉
                  </p>
                </div>
                <button onClick={downloadCert}
                        className="w-full py-4 rounded-2xl text-white text-xl font-bold transition-all hover:scale-105 active:scale-95"
                        style={{ fontFamily: "'Fredoka', cursive",
                                 background: "linear-gradient(135deg,#f59e0b,#ec4899)",
                                 boxShadow: "0 10px 25px -5px rgba(245,158,11,0.5)" }}>
                  <Award size={22} className="inline mr-2" />
                  Download My Certificate!
                </button>
              </div>
            )}
          </div>
        ) : (
          <div>
            <div className="flex justify-center mb-4">
              {great ? (
                <Trophy size={80} className="text-yellow-400" fill="currentColor" />
              ) : (
                <Heart size={80} className="text-pink-400" fill="currentColor" />
              )}
            </div>
            <h2 className="text-4xl mb-2 font-black"
                style={{ fontFamily: "'Fredoka', cursive",
                         background: "linear-gradient(135deg,#ec4899,#a855f7)",
                         WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
              {great ? "Wonderful Work!" : "Great Effort!"}
            </h2>
            <p className="text-purple-700 text-xl mb-3" style={{ fontFamily: "'Fredoka', cursive" }}>
              {name}, you scored <strong>{score} / {total}</strong>!
            </p>
            <p className="text-purple-600 text-md mb-5">
              {great
                ? "You're so close to the Champion prize! Try again to unlock the Unicorn Garden! 🦄"
                : "Keep practicing — every try makes you stronger! You can do it! 💪✨"}
            </p>
            <button onClick={() => window.location.reload()}
                    className="w-full py-4 rounded-2xl text-white text-xl font-bold transition-all hover:scale-105 active:scale-95"
                    style={{ fontFamily: "'Fredoka', cursive",
                             background: "linear-gradient(135deg,#ec4899,#a855f7)" }}>
              <RefreshCw size={20} className="inline mr-2" />
              Try Again!
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function MathQuest() {
  const [stage, setStage] = useState("welcome");
  const [name, setName] = useState("");
  const [order, setOrder] = useState([]);
  const [qIdx, setQIdx] = useState(0);
  const [score, setScore] = useState(0);
  const [firstHalfScore, setFirstHalfScore] = useState(0);
  const [finalGamePlayed, setFinalGamePlayed] = useState(false);

  const startQuiz = () => {
    if (!name.trim()) return;
    const arr = [...QUESTIONS];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    const inputs = arr.filter((q) => q.type === "input");
    const mcs = arr.filter((q) => q.type === "mc");
    const mixed = [];
    while (inputs.length || mcs.length) {
      if (mcs.length) mixed.push(mcs.shift());
      if (inputs.length) mixed.push(inputs.shift());
    }
    setOrder(mixed);
    setQIdx(0); setScore(0); setFirstHalfScore(0);
    setStage("quiz");
  };

  const handleAnswer = (correct) => {
    const newScore = correct ? score + 1 : score;
    setScore(newScore);
    if (qIdx === 19) { setFirstHalfScore(newScore); setStage("midcheck"); return; }
    if (qIdx === 39) { setStage("final"); return; }
    setQIdx(qIdx + 1);
  };

  return (
    <div className="min-h-screen relative"
         style={{ background: "linear-gradient(135deg,#fce7f3 0%,#e9d5ff 50%,#dbeafe 100%)",
                  fontFamily: "'Quicksand', sans-serif" }}>
      <FloatingBackground />

      {stage === "welcome" && <WelcomeScreen onStart={startQuiz} name={name} setName={setName} />}

      {stage === "quiz" && order[qIdx] && (
        <QuestionCard q={order[qIdx]} qIndex={qIdx} total={40} score={score}
                      onAnswer={handleAnswer} name={name} />
      )}

      {stage === "midcheck" && (
        <MidCheckpoint score={firstHalfScore} name={name}
                       onContinue={() => { setQIdx(20); setStage("quiz"); }}
                       onPlayGame={() => setStage("midgame")} />
      )}

      {stage === "midgame" && (
        <StarCatcherGame onFinish={() => { setQIdx(20); setStage("quiz"); }} />
      )}

      {stage === "final" && (
        <FinalScreen score={score} total={40} name={name} gamePlayed={finalGamePlayed}
                     onPlayGame={() => setStage("finalgame")} />
      )}

      {stage === "finalgame" && (
        <UnicornGardenGame onFinish={() => { setFinalGamePlayed(true); setStage("final"); }} />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<MathQuest />);
</script>
