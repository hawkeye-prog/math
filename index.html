// ==========================================
// HoldButton: works reliably on iPad, Android, mouse.
// Uses Pointer Events with setPointerCapture so the
// "release" fires even if the finger slides off.
// ==========================================
function HoldButton({ onPress, onRelease, onTap, children, className = "", style = {} }) {
  const ref = useRef(null);
  const pointerIdRef = useRef(null);

  useEffect(() => {
    const el = ref.current;
    if (!el) return;

    const release = () => {
      if (pointerIdRef.current !== null) {
        try { el.releasePointerCapture(pointerIdRef.current); } catch (e) {}
        pointerIdRef.current = null;
        if (onRelease) onRelease();
      }
    };

    const onPointerDown = (e) => {
      e.preventDefault();
      if (pointerIdRef.current !== null) return; // already pressed
      pointerIdRef.current = e.pointerId;
      try { el.setPointerCapture(e.pointerId); } catch (err) {}
      if (onPress) onPress();
      if (onTap) onTap();
    };
    const onPointerUp = (e) => {
      if (pointerIdRef.current !== e.pointerId) return;
      e.preventDefault();
      release();
    };
    const onPointerCancel = (e) => {
      if (pointerIdRef.current !== e.pointerId) return;
      release();
    };

    // Fallback for old Safari (touch events)
    const onTouchStart = (e) => {
      e.preventDefault();
      if (pointerIdRef.current !== null) return;
      pointerIdRef.current = "touch";
      if (onPress) onPress();
      if (onTap) onTap();
    };
    const onTouchEnd = (e) => {
      e.preventDefault();
      if (pointerIdRef.current === "touch") {
        pointerIdRef.current = null;
        if (onRelease) onRelease();
      }
    };

    // Mouse fallback
    const onMouseDown = (e) => {
      if (pointerIdRef.current !== null) return;
      pointerIdRef.current = "mouse";
      if (onPress) onPress();
      if (onTap) onTap();
    };
    const onMouseUp = () => {
      if (pointerIdRef.current === "mouse") {
        pointerIdRef.current = null;
        if (onRelease) onRelease();
      }
    };
    const onMouseLeave = onMouseUp;

    const supportsPointer = "PointerEvent" in window;
    if (supportsPointer) {
      el.addEventListener("pointerdown", onPointerDown);
      el.addEventListener("pointerup", onPointerUp);
      el.addEventListener("pointercancel", onPointerCancel);
      el.addEventListener("pointerleave", onPointerCancel);
    } else {
      el.addEventListener("touchstart", onTouchStart, { passive: false });
      el.addEventListener("touchend", onTouchEnd, { passive: false });
      el.addEventListener("touchcancel", onTouchEnd, { passive: false });
      el.addEventListener("mousedown", onMouseDown);
      el.addEventListener("mouseup", onMouseUp);
      el.addEventListener("mouseleave", onMouseLeave);
    }

    // Global safety net: if window loses focus, release
    const onBlur = () => release();
    window.addEventListener("blur", onBlur);
    document.addEventListener("visibilitychange", onBlur);

    return () => {
      release();
      el.removeEventListener("pointerdown", onPointerDown);
      el.removeEventListener("pointerup", onPointerUp);
      el.removeEventListener("pointercancel", onPointerCancel);
      el.removeEventListener("pointerleave", onPointerCancel);
      el.removeEventListener("touchstart", onTouchStart);
      el.removeEventListener("touchend", onTouchEnd);
      el.removeEventListener("touchcancel", onTouchEnd);
      el.removeEventListener("mousedown", onMouseDown);
      el.removeEventListener("mouseup", onMouseUp);
      el.removeEventListener("mouseleave", onMouseLeave);
      window.removeEventListener("blur", onBlur);
      document.removeEventListener("visibilitychange", onBlur);
    };
  }, [onPress, onRelease, onTap]);

  return (
    <button ref={ref} className={"touch-btn " + className} style={style}>
      {children}
    </button>
  );
}

// ==========================================
// Floating sparkles
// ==========================================
function FloatingBackground() {
  return (
    <div className="fixed inset-0 pointer-events-none overflow-hidden z-0">
      {Array.from({ length: 18 }, (_, i) => {
        const left = (i * 37) % 100, top = (i * 53) % 100;
        const size = 8 + (i % 4) * 6, delay = (i * 0.4) % 6, dur = 6 + (i % 5);
        return (
          <div key={i} className="absolute"
               style={{ left: `${left}%`, top: `${top}%`, animation: `float ${dur}s ease-in-out ${delay}s infinite` }}>
            <Star size={size} className="text-pink-200" fill="currentColor"
                  style={{ filter: "drop-shadow(0 0 6px rgba(255,182,193,0.8))" }} />
          </div>
        );
      })}
    </div>
  );
}

// ==========================================
// Question Card
// ==========================================
function QuestionCard({ q, qIndex, total, score, onAnswer, name }) {
  const [input, setInput] = useState("");
  const [feedback, setFeedback] = useState(null);
  const [locked, setLocked] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => {
    setInput(""); setFeedback(null); setLocked(false);
    if (q.type === "input" && inputRef.current) {
      setTimeout(() => inputRef.current?.focus(), 100);
    }
  }, [q.id]);

  const normalize = (s) => String(s).trim().toLowerCase().replace(/\s+/g, " ").replace(/^\s+|\s+$/g, "").replace(/,/g, "");
  const checkAnswer = (given) => {
    if (locked) return;
    setLocked(true);
    const correctList = q.accept || [q.answer];
    const correct = correctList.some((a) => normalize(a) === normalize(given));
    setFeedback({ correct, correctAnswer: q.answer });
    setTimeout(() => onAnswer(correct), correct ? 1300 : 2100);
  };

  const progress = (qIndex / total) * 100;

  return (
    <div className="relative z-10 min-h-screen flex items-center justify-center p-4">
      <div className="max-w-2xl w-full">
        <div className="flex items-center justify-between mb-4 px-2">
          <div className="bg-white/90 backdrop-blur rounded-full px-4 py-2 shadow-lg flex items-center gap-2"
               style={{ fontFamily: "'Fredoka', cursive" }}>
            <Sparkles size={18} className="text-purple-500" fill="currentColor" />
            <span className="text-purple-700 font-bold">{qIndex + 1} / {total}</span>
          </div>
          <div className="bg-white/90 backdrop-blur rounded-full px-4 py-2 shadow-lg flex items-center gap-2"
               style={{ fontFamily: "'Fredoka', cursive" }}>
            <Star size={18} className="text-yellow-400" fill="currentColor" />
            <span className="text-purple-700 font-bold">{score}</span>
          </div>
        </div>

        <div className="bg-white/60 rounded-full h-3 overflow-hidden mb-6 shadow-inner">
          <div className="h-full transition-all duration-700 ease-out"
               style={{ width: `${progress}%`, background: "linear-gradient(90deg,#ec4899,#a855f7,#3b82f6)" }} />
        </div>

        <div key={q.id}
             className="bg-white/95 backdrop-blur-md rounded-[2rem] shadow-2xl p-8 border-4 border-pink-200"
             style={{ boxShadow: "0 25px 60px -15px rgba(168,85,247,0.4)", animation: "cardIn 0.5s ease-out" }}>
          <div className="flex justify-between items-center mb-4">
            <span className="inline-block px-3 py-1 rounded-full text-xs font-bold text-white"
                  style={{ fontFamily: "'Fredoka', cursive",
                           background: "linear-gradient(90deg,#a855f7,#ec4899)" }}>
              {q.topic}
            </span>
            <Heart size={20} className="text-pink-400" fill="currentColor" />
          </div>

          <h2 className="text-2xl md:text-3xl text-purple-900 mb-6 leading-snug font-bold"
              style={{ fontFamily: "'Fredoka', cursive" }}>
            {q.q}
          </h2>

          {q.type === "mc" ? (
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              {q.choices.map((c, i) => {
                const colors = ["from-pink-400 to-pink-500", "from-purple-400 to-purple-500",
                                "from-blue-400 to-blue-500", "from-teal-400 to-teal-500"];
                const isCorrectChoice = feedback && c === q.answer;
                const isWrongPicked = feedback && !feedback.correct && input === c;
                return (
                  <button key={i} onClick={() => { setInput(c); checkAnswer(c); }}
                          disabled={locked}
                          className={`p-4 rounded-2xl text-white text-lg font-bold transition-all transform hover:scale-105 active:scale-95 disabled:cursor-not-allowed bg-gradient-to-br ${colors[i % 4]} ${
                            isCorrectChoice ? "ring-4 ring-green-400 scale-105" : ""
                          } ${isWrongPicked ? "ring-4 ring-red-400 opacity-70" : ""}`}
                          style={{ fontFamily: "'Fredoka', cursive",
                                   boxShadow: "0 8px 20px -5px rgba(0,0,0,0.2)" }}>
                    {c}
                  </button>
                );
              })}
            </div>
          ) : (
            <div>
              <input ref={inputRef} type="text" value={input}
                     onChange={(e) => setInput(e.target.value)}
                     onKeyDown={(e) => { if (e.key === "Enter" && input.trim() && !locked) checkAnswer(input); }}
                     disabled={locked} placeholder="Type your answer..."
                     className="w-full px-5 py-4 rounded-2xl text-purple-800 text-2xl text-center font-bold focus:outline-none focus:border-pink-400 bg-white"
                     style={{ fontFamily: "'Fredoka', cursive", borderWidth: "4px", borderStyle: "solid", borderColor: "#d8b4fe" }} />
              <button onClick={() => input.trim() && checkAnswer(input)}
                      disabled={locked || !input.trim()}
                      className="w-full mt-3 py-3 rounded-2xl text-white text-lg font-bold transition-all hover:scale-105 active:scale-95 disabled:opacity-50"
                      style={{ fontFamily: "'Fredoka', cursive",
                               background: "linear-gradient(135deg,#ec4899,#a855f7)" }}>
                Submit <ChevronRight size={18} className="inline" />
              </button>
            </div>
          )}

          {feedback && (
            <div className={`mt-5 p-4 rounded-2xl text-center font-bold text-lg ${
                   feedback.correct ? "bg-green-100 text-green-700" : "bg-pink-100 text-pink-700" }`}
                 style={{ fontFamily: "'Fredoka', cursive", animation: "popIn 0.4s ease-out" }}>
              {feedback.correct ? (
                <span>🎉 Yes! You got it, {name}! ✨</span>
              ) : (
                <span>💖 Not quite! The answer was <strong>{feedback.correctAnswer}</strong></span>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ==========================================================
// GAME 1: Crystal Cave Runner — side-scrolling platformer
// Features: gravity, double-jump, scrolling world, parallax,
// crystals, mushroom bouncers, spike traps, moving platforms,
// goblin enemies, lives, fairy character with wing flutter.
// ==========================================================
function CrystalCaveGame({ onFinish }) {
  const canvasRef = useRef(null);
  const [hud, setHud] = useState({ score: 0, lives: 3, gems: 0, time: 600 });
  const stateRef = useRef(null);

  useEffect(() => {

    const ctx = canvas.getContext("2d");
    const W = canvas.width, H = canvas.height;
    const GRAVITY = 1500, JUMP_VEL = -560, MOVE_SPEED = 280, MAX_FALL = 900;

    // Build a long level
    const level = {
      width: 6000,
      ground: H - 60,
      platforms: [],
      crystals: [],
      mushrooms: [],
      spikes: [],
      enemies: [],
      checkpoints: [],

    // Ground sections with gaps
    const groundSections = [

    // Platforms (x, y, w, optional move)
    const plats = [
      { x: 300, y: 420, w: 100 }, { x: 500, y: 340, w: 100 }, { x: 700, y: 420, w: 100 },
      { x: 1000, y: 380, w: 120 }, { x: 1200, y: 300, w: 100 }, { x: 1400, y: 380, w: 120 },
      { x: 1750, y: 360, w: 90 }, { x: 1900, y: 280, w: 90 }, { x: 2050, y: 360, w: 90 }, { x: 2200, y: 280, w: 90 },
      { x: 2700, y: 380, w: 100, move: { axis: "y", min: 320, max: 440, speed: 70, dir: 1 } },

      { x: 3100, y: 380, w: 100, move: { axis: "y", min: 320, max: 440, speed: 70, dir: -1 } },
      { x: 3550, y: 400, w: 80 }, { x: 3700, y: 320, w: 80 }, { x: 3850, y: 240, w: 80 }, { x: 4000, y: 320, w: 80 },
      { x: 4300, y: 380, w: 100, move: { axis: "x", min: 4300, max: 4500, speed: 80, dir: 1 } },
      { x: 4600, y: 320, w: 100 }, { x: 4750, y: 380, w: 100 },
      { x: 5100, y: 380, w: 110 }, { x: 5300, y: 320, w: 110 }, { x: 5500, y: 260, w: 110 }, { x: 5700, y: 200, w: 110 },

    level.platforms = plats.map((p) => ({ ...p, baseX: p.x, baseY: p.y, h: 18 }));

    // Crystals - sparkly collectibles
    const crystalSpots = [
      [350, 380], [550, 300], [750, 380], [900, 200],
      [1050, 340], [1250, 260], [1450, 340],
      [1800, 320], [1950, 240], [2100, 320], [2250, 240],
      [2750, 340], [2950, 240], [3150, 340],
      [3600, 360], [3750, 280], [3900, 200], [4050, 280],
      [4350, 340], [4650, 280], [4800, 340],
      [5150, 340], [5350, 280], [5550, 220], [5750, 160],
      [5870, 100],
    ];
    level.crystals = crystalSpots.map((c) => ({ x: c[0], y: c[1], collected: false, t: Math.random() * Math.PI * 2 }));

    // Mushroom bouncers - spring you high
    level.mushrooms = [
      { x: 1600, y: H - 80 }, { x: 2480, y: H - 80 }, { x: 3380, y: H - 80 }, { x: 4170, y: H - 80 }, { x: 4970, y: H - 80 },
